spring.application.name=clinic_system

# Puerto din\u00E1mico (Render lo asigna autom\u00E1ticamente)
server.port=${PORT:8080}

# Conexión a MySQL en Railway (usa las variables de entorno de Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}


# Driver automático (Spring Boot lo detectará de la URL)

# Configuraci\u00F3n JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

debug=true
