spring.application.name=clinic_system

# Puerto din·mico (Render lo asigna autom·ticamente)
server.port=${PORT:8080}

# ConexiÛn a MySQL en Railway (usa las variables de entorno de Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}   

# Driver y dialecto de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ConfiguraciÛn JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

debug=true
